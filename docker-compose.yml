version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gugong_backend
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: production
      FLASK_APP: app
    volumes:
      - ./backend/app/uploads:/app/app/uploads
    restart: unless-stopped
    networks:
      - gugong_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_BASE_PATH: /
        VITE_API_BASE_URL: http://8.137.170.218:5000
    container_name: gugong_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - gugong_network

networks:
  gugong_network:
    driver: bridge
